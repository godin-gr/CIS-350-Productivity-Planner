name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Flutter tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: productivity_planner_app/productivity_planner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test test/models test/utils test/controllers test/database test/pages --concurrency=1
