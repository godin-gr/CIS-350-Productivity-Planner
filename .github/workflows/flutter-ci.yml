name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: productivity_planner_app/productivity_planner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test unit_test/models unit_test/utils unit_test/controllers unit_test/database unit_test/pages --concurrency=1

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    defaults:
      run:
        working-directory: productivity_planner_app/productivity_planner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev xvfb

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: xvfb-run -a --server-args="-screen 0 1280x720x24" flutter test integration_test/app_navigation_test.dart -d linux